<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Main Map View - Light</title>
<!-- Fonts -->
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<!-- Tailwind CSS -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<!-- Theme Configuration -->
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#137fec",
                        "background-light": "#f6f7f8",
                        "background-dark": "#101922",
                        "surface-light": "#ffffff",
                        "surface-dark": "#1e293b",
                    },
                    fontFamily: {
                        "display": ["Plus Jakarta Sans", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.5rem", // 8px
                        "lg": "1rem",        // 16px (Prompt requested 16px)
                        "xl": "1.5rem",      // 24px
                        "2xl": "2rem",       // 32px
                        "full": "9999px"
                    },
                    boxShadow: {
                        'soft': '0 4px 20px -2px rgba(0, 0, 0, 0.05)',
                        'float': '0 8px 30px -4px rgba(0, 0, 0, 0.1)',
                    }
                },
            },
        }
    </script>
<style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
        }
        /* Hide scrollbar for horizontal scrolling areas */
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark text-slate-900 dark:text-white h-screen w-full overflow-hidden flex flex-col relative group/design-root">
<!-- Map Background Layer -->
<div class="absolute inset-0 z-0 bg-slate-200 dark:bg-slate-800 overflow-hidden">
<!-- Abstract Map Representation -->
<div class="w-full h-full bg-cover bg-center opacity-80 mix-blend-multiply dark:mix-blend-normal dark:opacity-40" data-alt="Light gray minimalist city map view from above" data-location="Paris, France" style='background-image: url("https://lh3.googleusercontent.com/aida-public/AB6AXuAY044aGELVvE37FzfC-FCoeOMeXvCg1zqgpwMWWrLgh9Fe9Sox43n2QYHDIQRhC-pPzO1XUmNaVe24HWz7bSRz0LnM-x4DTTzbdolwJNS365wkQsorwl1pi-nLbZ3Zw4kkf16i8_iKYvDdGDJbFyV1FerFvFp0W3X-_XwSPazZfxvBdHpVbTRCA4hIRhcevKpF0zE48dRKD_1JumhVzxDtA0ppRarmVTR8FN5h8FJpoqPMo_8Q15yNsSWlB3sFvnjgpuXuAuUClDs");'>
</div>
<!-- Pins Overlay -->
<div class="absolute inset-0 z-0 pointer-events-none">
<!-- Pin 1: Vibrant Teal (Price transparency) -->
<div class="absolute top-[30%] left-[20%] flex flex-col items-center pointer-events-auto cursor-pointer group transition-transform hover:scale-110">
<div class="flex items-center gap-1.5 px-3 py-2 bg-teal-500 text-white rounded-lg shadow-float">
<span class="material-symbols-outlined text-[18px]">restaurant</span>
<span class="text-sm font-bold">€€</span>
</div>
<div class="w-0 h-0 border-l-[6px] border-l-transparent border-r-[6px] border-r-transparent border-t-[8px] border-t-teal-500 filter drop-shadow-sm"></div>
</div>
<!-- Pin 2: Vibrant Orange (Selected/Active) -->
<div class="absolute top-[45%] left-[55%] flex flex-col items-center pointer-events-auto cursor-pointer group scale-110 z-10">
<div class="flex items-center gap-1.5 px-3 py-2 bg-orange-500 text-white rounded-lg shadow-float ring-4 ring-white/30">
<span class="material-symbols-outlined text-[18px]">local_cafe</span>
<span class="text-sm font-bold">€€€</span>
</div>
<div class="w-0 h-0 border-l-[6px] border-l-transparent border-r-[6px] border-r-transparent border-t-[8px] border-t-orange-500 filter drop-shadow-sm"></div>
</div>
<!-- Pin 3: Vibrant Gold (Top Rated) -->
<div class="absolute top-[25%] right-[15%] flex flex-col items-center pointer-events-auto cursor-pointer group transition-transform hover:scale-110">
<div class="flex items-center gap-1.5 px-3 py-2 bg-amber-400 text-white rounded-lg shadow-float">
<span class="material-symbols-outlined text-[18px]">hotel</span>
<span class="text-sm font-bold">€€€€</span>
</div>
<div class="w-0 h-0 border-l-[6px] border-l-transparent border-r-[6px] border-r-transparent border-t-[8px] border-t-amber-400 filter drop-shadow-sm"></div>
</div>
<!-- Pin 4: Secondary -->
<div class="absolute bottom-[40%] left-[10%] flex flex-col items-center pointer-events-auto cursor-pointer group transition-transform hover:scale-110">
<div class="flex items-center gap-1.5 px-3 py-2 bg-white text-slate-800 rounded-lg shadow-float dark:bg-slate-700 dark:text-white">
<span class="material-symbols-outlined text-[18px]">attractions</span>
<span class="text-sm font-bold">€</span>
</div>
<div class="w-0 h-0 border-l-[6px] border-l-transparent border-r-[6px] border-r-transparent border-t-[8px] border-t-white dark:border-t-slate-700 filter drop-shadow-sm"></div>
</div>
</div>
</div>
<!-- UI Overlay Layer -->
<div class="relative z-10 flex flex-col h-full pointer-events-none">
<!-- Top Search Bar -->
<div class="pt-12 px-4 pb-2 w-full pointer-events-auto bg-gradient-to-b from-white/60 to-transparent dark:from-black/60">
<div class="flex flex-col gap-3 max-w-md mx-auto w-full">
<!-- Search Input -->
<div class="flex items-center bg-surface-light dark:bg-surface-dark rounded-lg shadow-soft h-12 px-4 gap-3 border border-slate-100 dark:border-slate-700">
<span class="material-symbols-outlined text-slate-400">search</span>
<input class="flex-1 bg-transparent border-none outline-none text-slate-900 dark:text-white placeholder-slate-400 text-base focus:ring-0 p-0" placeholder="Search hotels, spots..." type="text"/>
<button class="flex items-center justify-center text-slate-800 dark:text-slate-200 bg-slate-100 dark:bg-slate-700 rounded-full p-1.5">
<span class="material-symbols-outlined text-[20px]">tune</span>
</button>
</div>
<!-- Filter Chips -->
<div class="flex gap-2 overflow-x-auto no-scrollbar pb-1">
<button class="flex items-center gap-1.5 bg-surface-light dark:bg-surface-dark px-3 py-2 rounded-lg shadow-sm border border-slate-100 dark:border-slate-700 whitespace-nowrap">
<span class="text-sm font-medium text-slate-700 dark:text-slate-200">Price</span>
<span class="material-symbols-outlined text-[16px] text-slate-400">expand_more</span>
</button>
<button class="flex items-center gap-1.5 bg-surface-light dark:bg-surface-dark px-3 py-2 rounded-lg shadow-sm border border-slate-100 dark:border-slate-700 whitespace-nowrap">
<span class="text-sm font-medium text-slate-700 dark:text-slate-200">Rating</span>
<span class="material-symbols-outlined text-[16px] text-slate-400">expand_more</span>
</button>
<button class="flex items-center gap-1.5 bg-surface-light dark:bg-surface-dark px-3 py-2 rounded-lg shadow-sm border border-slate-100 dark:border-slate-700 whitespace-nowrap">
<span class="text-sm font-medium text-slate-700 dark:text-slate-200">Open Now</span>
</button>
<button class="flex items-center gap-1.5 bg-primary text-white px-3 py-2 rounded-lg shadow-sm whitespace-nowrap">
<span class="text-sm font-medium">Anytime</span>
</button>
</div>
</div>
</div>
<!-- Spacer to push bottom sheet down -->
<div class="flex-1 relative">
<!-- Map Controls (Floating Right) -->
<div class="absolute right-4 top-4 flex flex-col gap-3 pointer-events-auto">
<button class="w-10 h-10 bg-surface-light dark:bg-surface-dark rounded-lg shadow-float flex items-center justify-center text-slate-700 dark:text-white hover:bg-slate-50 dark:hover:bg-slate-700 active:scale-95 transition-all">
<span class="material-symbols-outlined text-[24px]">near_me</span>
</button>
<div class="flex flex-col bg-surface-light dark:bg-surface-dark rounded-lg shadow-float overflow-hidden">
<button class="w-10 h-10 flex items-center justify-center text-slate-700 dark:text-white hover:bg-slate-50 dark:hover:bg-slate-700 active:bg-slate-100 dark:active:bg-slate-600 border-b border-slate-100 dark:border-slate-700">
<span class="material-symbols-outlined text-[24px]">add</span>
</button>
<button class="w-10 h-10 flex items-center justify-center text-slate-700 dark:text-white hover:bg-slate-50 dark:hover:bg-slate-700 active:bg-slate-100 dark:active:bg-slate-600">
<span class="material-symbols-outlined text-[24px]">remove</span>
</button>
</div>
</div>
</div>
<!-- Bottom Sheet -->
<div class="pointer-events-auto bg-surface-light dark:bg-surface-dark rounded-t-xl shadow-[0_-8px_30px_rgba(0,0,0,0.12)] pt-2 pb-6 px-4 w-full flex flex-col gap-4 animate-in slide-in-from-bottom duration-500">
<!-- Handle -->
<div class="w-full flex justify-center pb-2">
<div class="w-12 h-1.5 bg-slate-200 dark:bg-slate-600 rounded-full"></div>
</div>
<!-- Card Content -->
<div class="flex flex-col gap-4">
<!-- Header Info -->
<div class="flex justify-between items-start">
<div class="flex flex-col gap-1">
<div class="flex items-center gap-2">
<span class="px-2 py-0.5 rounded-full bg-teal-50 dark:bg-teal-900/30 text-teal-700 dark:text-teal-300 text-xs font-semibold tracking-wide uppercase">Local Favorite</span>
<div class="flex items-center gap-0.5 text-amber-400">
<span class="material-symbols-outlined text-[14px] fill-current">star</span>
<span class="text-xs font-medium text-slate-600 dark:text-slate-300">4.9 (1.2k)</span>
</div>
</div>
<h2 class="text-xl font-bold text-slate-900 dark:text-white leading-tight">Cafe de Flore</h2>
<p class="text-slate-500 dark:text-slate-400 text-sm font-normal">French Bistro • €€€ • 1.2km away</p>
</div>
<!-- Thumbnail -->
<div class="w-20 h-20 rounded-lg bg-cover bg-center shrink-0 shadow-sm" data-alt="Interior of a cozy cafe with warm lighting" style='background-image: url("https://lh3.googleusercontent.com/aida-public/AB6AXuAmeI35ZVK1F7sjvTpelEdnDBt7R4YoOg4m4IOgq8sUBKnI9PFEC4Zj7FHbm8lRsywpNY7cOgD2BNPWjwSPRpLiI5eSp12LgfJV9LIQlTyHW_xmiFvb-MHON-q70XZCVQ0r83SazsbDfTXpVJ4zu2pr4dKRy9GfWMqGw1LHYl86reWueUX86IiFb_O1trLWJf6_NFZXhAzTsw4Xl5eL_6xXw4dT_oAJnYsX1kTPCvjmn4r84mFfQngHaVf3ifeEPtjk3iI54J58hNs");'>
</div>
</div>
<!-- Trusted/Authentic Badges (Horizontal Scroll) -->
<div class="flex gap-3 overflow-x-auto no-scrollbar">
<div class="flex items-center gap-1.5 px-2 py-1 bg-orange-50 dark:bg-orange-900/20 rounded-md shrink-0">
<span class="material-symbols-outlined text-[16px] text-orange-600 dark:text-orange-400">verified</span>
<span class="text-xs font-medium text-orange-700 dark:text-orange-300">Verified Authentic</span>
</div>
<div class="flex items-center gap-1.5 px-2 py-1 bg-blue-50 dark:bg-blue-900/20 rounded-md shrink-0">
<span class="material-symbols-outlined text-[16px] text-primary">price_check</span>
<span class="text-xs font-medium text-primary">Price Guaranteed</span>
</div>
</div>
<!-- Action Button -->
<button class="w-full h-12 flex items-center justify-center gap-2 bg-primary hover:bg-blue-600 text-white rounded-lg shadow-lg shadow-blue-500/30 transition-all active:scale-[0.98]">
<span class="font-semibold text-base">View Details</span>
<span class="material-symbols-outlined text-[20px]">arrow_forward</span>
</button>
</div>
</div>
</div>
</body></html>
