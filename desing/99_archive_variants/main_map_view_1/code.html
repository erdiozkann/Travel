<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Main Map View</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script>
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "primary": "#137fec",
              "background-light": "#f6f7f8",
              "background-dark": "#101922",
            },
            fontFamily: {
              "display": ["Plus Jakarta Sans", "sans-serif"]
            },
            borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "2xl": "1rem", "full": "9999px"},
          },
        },
      }
    </script>
<style>
        .hide-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .hide-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
        .glass-panel {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
        }
        .dark .glass-panel {
            background: rgba(16, 25, 34, 0.85);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="font-display bg-background-light dark:bg-background-dark text-slate-900 dark:text-white h-screen overflow-hidden flex flex-col relative">
<!-- Full Screen Map Layer -->
<div class="absolute inset-0 z-0 bg-slate-200 dark:bg-slate-800">
<!-- Map Background Image -->
<div class="w-full h-full bg-cover bg-center opacity-80 dark:opacity-60" data-alt="Map of a city showing streets and blocks in light mode" data-location="Paris" style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuBJGfYYRFKDW7crsteaFnlDBmOILLfd2rqkWyLiBX8jSkeLXInwRUPdD6BDDB4NmSJD612XKw6E_QEW9w7TACvWUPIEzwanTNLVxm8ND39EYAyYkkEBdEiSIVXj9rF1uJZ4fVK6tZGbowUCvTc4HBQqwXhQzEbmnTnOpCeL2aZ56oihqvTmmYZm_RMWfIEMpCSPUVHQX6h_E0dYvGlZXwhPpmbU2GuUXq1D-1xPO0Z9MsQJFaUROqeqPFD2nit8SB5N9-L1lYMjGVY'); filter: grayscale(20%);">
</div>
<!-- Map Pins -->
<!-- Pin 1: Selected (Coffee) -->
<div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 flex flex-col items-center gap-1 cursor-pointer group hover:scale-110 transition-transform duration-200 z-10">
<div class="flex items-center gap-1.5 bg-primary text-white px-3 py-2 rounded-full shadow-lg shadow-primary/30 ring-2 ring-white dark:ring-slate-900">
<span class="material-symbols-outlined text-[18px]">local_cafe</span>
<span class="text-sm font-bold">€€</span>
</div>
<div class="w-2 h-2 bg-primary rotate-45 -mt-2 rounded-[1px] shadow-sm"></div>
</div>
<!-- Pin 2: Unselected (Restaurant) -->
<div class="absolute top-[30%] left-[20%] flex flex-col items-center gap-1 cursor-pointer hover:scale-110 transition-transform duration-200 z-0">
<div class="flex items-center gap-1.5 bg-white dark:bg-slate-800 text-slate-800 dark:text-slate-200 px-3 py-2 rounded-full shadow-md border border-slate-100 dark:border-slate-700">
<span class="material-symbols-outlined text-[18px]">restaurant</span>
<span class="text-sm font-medium">€</span>
</div>
<div class="w-2 h-2 bg-white dark:bg-slate-800 rotate-45 -mt-2 rounded-[1px]"></div>
</div>
<!-- Pin 3: Unselected (Bar) -->
<div class="absolute bottom-[40%] right-[15%] flex flex-col items-center gap-1 cursor-pointer hover:scale-110 transition-transform duration-200 z-0">
<div class="flex items-center gap-1.5 bg-white dark:bg-slate-800 text-slate-800 dark:text-slate-200 px-3 py-2 rounded-full shadow-md border border-slate-100 dark:border-slate-700">
<span class="material-symbols-outlined text-[18px]">wine_bar</span>
<span class="text-sm font-medium">€€€</span>
</div>
<div class="w-2 h-2 bg-white dark:bg-slate-800 rotate-45 -mt-2 rounded-[1px]"></div>
</div>
<!-- Pin 4: Unselected (Experience) -->
<div class="absolute top-[20%] right-[30%] flex flex-col items-center gap-1 cursor-pointer hover:scale-110 transition-transform duration-200 z-0">
<div class="flex items-center gap-1.5 bg-white dark:bg-slate-800 text-slate-800 dark:text-slate-200 px-3 py-2 rounded-full shadow-md border border-slate-100 dark:border-slate-700">
<span class="material-symbols-outlined text-[18px]">attractions</span>
<span class="text-sm font-medium">€€</span>
</div>
<div class="w-2 h-2 bg-white dark:bg-slate-800 rotate-45 -mt-2 rounded-[1px]"></div>
</div>
</div>
<!-- Top Search Area -->
<div class="absolute top-0 left-0 right-0 z-20 px-4 pt-14 pb-4 bg-gradient-to-b from-white/90 to-transparent dark:from-black/80 pointer-events-none">
<div class="flex items-center gap-3 pointer-events-auto">
<div class="flex-1 glass-panel rounded-full shadow-lg border border-white/20 dark:border-white/10 flex items-center h-12 px-4 transition-all">
<span class="material-symbols-outlined text-slate-400 dark:text-slate-500 mr-3">search</span>
<input class="bg-transparent border-none focus:ring-0 w-full text-slate-800 dark:text-white placeholder-slate-400 dark:placeholder-slate-500 text-base p-0" placeholder="Find authentic spots..." type="text"/>
</div>
<button class="glass-panel h-12 w-12 rounded-full shadow-lg border border-white/20 dark:border-white/10 flex items-center justify-center text-slate-800 dark:text-white active:scale-95 transition-transform">
<span class="material-symbols-outlined">tune</span> <!-- Filter Icon -->
</button>
</div>
<!-- Quick Categories -->
<div class="flex gap-2 mt-3 overflow-x-auto hide-scrollbar pointer-events-auto pl-1">
<button class="bg-primary text-white px-4 py-1.5 rounded-full text-sm font-medium shadow-md whitespace-nowrap">
                All
            </button>
<button class="bg-white dark:bg-slate-800 text-slate-700 dark:text-slate-200 px-4 py-1.5 rounded-full text-sm font-medium shadow-md whitespace-nowrap border border-slate-100 dark:border-slate-700">
                Restaurants
            </button>
<button class="bg-white dark:bg-slate-800 text-slate-700 dark:text-slate-200 px-4 py-1.5 rounded-full text-sm font-medium shadow-md whitespace-nowrap border border-slate-100 dark:border-slate-700">
                Coffee
            </button>
<button class="bg-white dark:bg-slate-800 text-slate-700 dark:text-slate-200 px-4 py-1.5 rounded-full text-sm font-medium shadow-md whitespace-nowrap border border-slate-100 dark:border-slate-700">
                Sights
            </button>
</div>
</div>
<!-- Right Side FAB (Location/Layers) -->
<div class="absolute right-4 bottom-32 z-20 flex flex-col gap-3">
<button class="glass-panel h-12 w-12 rounded-full shadow-lg border border-white/20 dark:border-white/10 flex items-center justify-center text-slate-800 dark:text-white active:scale-95 transition-transform">
<span class="material-symbols-outlined">layers</span>
</button>
<button class="glass-panel h-12 w-12 rounded-full shadow-lg border border-white/20 dark:border-white/10 flex items-center justify-center text-primary active:scale-95 transition-transform">
<span class="material-symbols-outlined font-variation-settings-fill">my_location</span>
</button>
</div>
<!-- Bottom Sheet (Preview Card) -->
<div class="absolute bottom-[80px] left-0 right-0 z-30 px-4 pb-2">
<div class="bg-white dark:bg-slate-800 rounded-2xl shadow-2xl shadow-black/20 overflow-hidden ring-1 ring-black/5 dark:ring-white/10 animate-in slide-in-from-bottom-10 duration-500">
<!-- Drag Handle -->
<div class="w-full flex justify-center pt-3 pb-1">
<div class="h-1 w-10 rounded-full bg-slate-200 dark:bg-slate-600"></div>
</div>
<!-- Card Content -->
<div class="p-4 pt-1">
<div class="flex gap-4">
<!-- Thumbnail -->
<div class="w-24 h-24 rounded-lg bg-cover bg-center shrink-0 shadow-inner" data-alt="Close up of latte art in a coffee cup" style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuCd_g5B3U8HAY1SnPto0c_g7kX7jGdlFVy7wPrHA8h0vmEbN7SqzphvekjOsNnO3vC3gtdqKQtFqfqH3HrTPqKKe5dtcTPhElRJdd906bfHW3lA9_75O_BXH_FL18HenUi0gbtr4yAYR0OqHp3Y8j46k9YXIYk-79sqylUHCIgM8I4hjL2lkcLPV86P28mLSEMOtR8QxfgrDXhTQgCAy8jtCrx5PxFGKQRWcLdFc8c9igWRy3GCiQA68byGOppm4S0JjvIK3SwGZYk');">
</div>
<!-- Details -->
<div class="flex flex-col flex-1 justify-between py-0.5">
<div>
<div class="flex justify-between items-start">
<h3 class="text-lg font-bold text-slate-900 dark:text-white leading-tight">The Local Roast</h3>
<button class="text-slate-400 hover:text-primary dark:text-slate-500 dark:hover:text-primary">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 0;">favorite</span>
</button>
</div>
<p class="text-sm text-slate-500 dark:text-slate-400 mt-1 flex items-center gap-1">
<span class="text-amber-400 material-symbols-outlined text-[16px]" style="font-variation-settings: 'FILL' 1;">star</span>
<span class="font-medium text-slate-700 dark:text-slate-300">4.8</span>
<span class="text-slate-400">(120)</span>
<span class="w-1 h-1 rounded-full bg-slate-300 dark:bg-slate-600 mx-1"></span>
<span class="font-medium text-slate-700 dark:text-slate-300">€€</span>
<span class="w-1 h-1 rounded-full bg-slate-300 dark:bg-slate-600 mx-1"></span>
                                Coffee
                            </p>
</div>
<div class="flex items-center justify-between mt-2">
<span class="inline-flex items-center gap-1 px-2 py-0.5 rounded text-xs font-semibold bg-primary/10 text-primary dark:bg-primary/20 dark:text-blue-300">
<span class="material-symbols-outlined text-[14px]">verified</span>
                                Local Favorite
                            </span>
</div>
</div>
</div>
<div class="mt-4 grid grid-cols-4 gap-2">
<button class="col-span-3 bg-primary hover:bg-blue-600 text-white font-semibold py-2.5 px-4 rounded-lg text-sm transition-colors flex items-center justify-center gap-2">
                        View Details
                        <span class="material-symbols-outlined text-[18px]">arrow_forward</span>
</button>
<button class="col-span-1 bg-background-light dark:bg-slate-700 hover:bg-slate-200 dark:hover:bg-slate-600 text-slate-700 dark:text-white font-medium py-2.5 rounded-lg text-sm transition-colors flex items-center justify-center">
<span class="material-symbols-outlined text-[20px]">directions</span>
</button>
</div>
</div>
</div>
</div>
<!-- Bottom Navigation Bar -->
<div class="absolute bottom-0 w-full h-[80px] bg-white/90 dark:bg-[#101922]/90 backdrop-blur-md border-t border-slate-200 dark:border-slate-800 z-50 flex items-start pt-3 justify-around pb-6">
<button class="flex flex-col items-center gap-1 w-16 group">
<span class="material-symbols-outlined text-primary group-hover:scale-110 transition-transform font-variation-settings-fill">explore</span>
<span class="text-[10px] font-medium text-primary">Explore</span>
</button>
<button class="flex flex-col items-center gap-1 w-16 group">
<span class="material-symbols-outlined text-slate-400 dark:text-slate-500 group-hover:text-slate-600 dark:group-hover:text-slate-300 transition-colors">favorite</span>
<span class="text-[10px] font-medium text-slate-400 dark:text-slate-500 group-hover:text-slate-600 dark:group-hover:text-slate-300 transition-colors">Saved</span>
</button>
<button class="flex flex-col items-center gap-1 w-16 group">
<span class="material-symbols-outlined text-slate-400 dark:text-slate-500 group-hover:text-slate-600 dark:group-hover:text-slate-300 transition-colors">airplane_ticket</span>
<span class="text-[10px] font-medium text-slate-400 dark:text-slate-500 group-hover:text-slate-600 dark:group-hover:text-slate-300 transition-colors">Trips</span>
</button>
<button class="flex flex-col items-center gap-1 w-16 group">
<span class="material-symbols-outlined text-slate-400 dark:text-slate-500 group-hover:text-slate-600 dark:group-hover:text-slate-300 transition-colors">person</span>
<span class="text-[10px] font-medium text-slate-400 dark:text-slate-500 group-hover:text-slate-600 dark:group-hover:text-slate-300 transition-colors">Profile</span>
</button>
</div>
</body></html>
